version: '3.8'

services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: thesvg-dev
    volumes:
      - ..:/workspaces/thesvg
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3333:3333"
    working_dir: /workspaces/thesvg
    stdin_open: true
    tty: true
